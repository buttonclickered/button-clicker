<!DOCTYPE html>
<html lang="fr">
<head>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="../search.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plural Rules</title>
</head>
<body>
    <button id="back" onclick="history.back()">
  <img src="/search/Images/back.png" width="35">
</button>
<h1>Plural Rules</h1>
<table>
    <tr>
        <th>Ending</th>
        <th>Plural Ending</th>
    </tr>
    <tr>
        <td>-s, -x, -z</td>
        <td>doesn't change</td>
    </tr>
    <tr>
        <td>-al</td>
        <td>-aux</td>
    </tr>
    <tr>
        <td>-eau, -au, -eu</td>
        <td>-eaux, -aux, -eux</td>
    </tr>
    <tr>
        <td>-ou</td>
        <td>-ous (exceptions)</td>
    </tr>
    <tr>
        <td>Others</td>
        <td>add -s</td>
</table>
<h1> Examples: </h1>
<table>
    <tr>
        <th>Singular</th>
        <th>Plural</th>
    </tr>
    <tr>
        <td>un chat</td>
        <td>des chats</td>
    </tr>
    <tr>
        <td>un cheval</td>
        <td>des chevaux</td>
    </tr>
    <tr>
        <td>un bureau</td>
        <td>des bureaux</td>
    </tr>
    <tr>
        <td>un bijou</td>
        <td>des bijoux</td>
    </tr>
    <tr>
        <td>une maison</td>
        <td>des maisons</td>
    </tr>
</table>
</body>
</html>

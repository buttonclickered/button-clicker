<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Conjugueur Français</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        #status { font-size: 12px; color: orange; margin-bottom: 10px; text-align: center; font-weight: bold; }
        .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .verb-form { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <div id="status">⏳ Chargement...</div>
    <input type="text" id="verbInput" placeholder="Ex: manger, être..." value="manger" disabled>
    <select id="tenseSelect">
        <option value="PRESENT">Présent</option>
        <option value="FUTUR">Futur</option>
        <option value="IMPARFAIT">Imparfait</option>
        <option value="CONDITIONNEL_PRESENT">Conditionnel</option>
        <option value="SUBJONCTIF_PRESENT">Subjonctif</option>
    </select>
    <div id="results"></div>
</div>

<script type="module">
    import { getConjugation } from 'https://cdn.jsdelivr.net/npm/french-verbs@latest/dist/index.mjs';
    import Lefff from 'https://cdn.jsdelivr.net/npm/french-verbs-lefff@latest/dist/conjugations.mjs';

    const status = document.getElementById('status');
    const input = document.getElementById('verbInput');

    status.textContent = '✅ Prêt !';
    status.style.color = 'green';
    input.disabled = false;

    function update() {
        const verb = input.value.trim().toLowerCase() || 'manger';
        const tense = document.getElementById('tenseSelect').value;
        const pronouns = ['Je', 'Tu', 'Il/Elle', 'Nous', 'Vous', 'Ils/Elles'];
        let html = '';
        try {
            for (let i = 0; i < 6; i++) {
                const form = getConjugation(Lefff, verb, tense, i);
                html += `<div class="row"><span>${pronouns[i]}</span><span class="verb-form">${form}</span></div>`;
            }
        } catch (e) {
            html = '<div style="color:red;text-align:center;padding:10px">Verbe non trouvé.</div>';
        }
        document.getElementById('results').innerHTML = html;
    }

    input.addEventListener('input', update);
    document.getElementById('tenseSelect').addEventListener('change', update);
    update();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French Conjugator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #fff;
    color: #111;
    min-height: 100vh;
    padding: 3rem 1.5rem;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    margin-bottom: 2rem;
    color: #111;
  }

  .input-row {
    display: flex;
    gap: 0.5rem;
    max-width: 420px;
    margin-bottom: 1rem;
  }

  input[type="text"] {
    flex: 1;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    padding: 0.6rem 0.9rem;
    border: 1.5px solid #ddd;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.15s;
    background: #fafafa;
    color: #111;
  }

  input[type="text"]:focus {
    border-color: #111;
    background: #fff;
  }

  input[type="text"]::placeholder { color: #aaa; }

  button.go {
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 0.6rem 1.2rem;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }

  button.go:hover { background: #333; }

  .quick-verbs {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.4rem;
    max-width: 420px;
    margin-bottom: 2.5rem;
  }

  .quick-verbs span {
    font-size: 0.78rem;
    color: #aaa;
  }

  .qv {
    font-size: 0.78rem;
    padding: 0.22rem 0.6rem;
    border: 1px solid #e0e0e0;
    border-radius: 20px;
    background: none;
    cursor: pointer;
    color: #666;
    font-family: 'Inter', sans-serif;
    transition: all 0.12s;
  }

  .qv:hover { border-color: #111; color: #111; }

  .error {
    font-size: 0.82rem;
    color: #c00;
    margin-bottom: 1.5rem;
    display: none;
  }

  .result-verb {
    font-size: 1.3rem;
    font-weight: 500;
    margin-bottom: 0.2rem;
  }

  .result-note {
    font-size: 0.78rem;
    color: #999;
    margin-bottom: 2rem;
  }

  .tenses {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 2rem;
    max-width: 640px;
  }

  .tense-block h2 {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #bbb;
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid #f0f0f0;
  }

  .row {
    display: flex;
    justify-content: space-between;
    padding: 0.28rem 0;
    font-size: 0.88rem;
    border-bottom: 1px solid #f7f7f7;
  }

  .row:last-child { border-bottom: none; }

  .pron { color: #bbb; }
  .form { color: #111; }

  #output { display: none; }
</style>
</head>
<body>

<h1>French Conjugator</h1>

<div class="input-row">
  <input type="text" id="verbInput" placeholder="Enter a verb (e.g. parler)" autocomplete="off" />
  <button class="go" onclick="conjugate()">Go</button>
</div>

<div class="quick-verbs">
  <span>Try:</span>
  <button class="qv" onclick="tryVerb('être')">être</button>
  <button class="qv" onclick="tryVerb('avoir')">avoir</button>
  <button class="qv" onclick="tryVerb('aller')">aller</button>
  <button class="qv" onclick="tryVerb('faire')">faire</button>
  <button class="qv" onclick="tryVerb('parler')">parler</button>
  <button class="qv" onclick="tryVerb('vouloir')">vouloir</button>
  <button class="qv" onclick="tryVerb('finir')">finir</button>
</div>

<div class="error" id="error">Unknown verb ending — try a verb ending in -er, -ir, or -re.</div>

<div id="output">
  <div class="result-verb" id="resultVerb"></div>
  <div class="result-note" id="resultNote"></div>
  <div class="tenses" id="tensesGrid"></div>
</div>

<script>
const pronouns = ["je","tu","il","nous","vous","ils"];
const labels = { je:"je", tu:"tu", il:"il / elle", nous:"nous", vous:"vous", ils:"ils / elles" };
const allerP = { je:"vais", tu:"vas", il:"va", nous:"allons", vous:"allez", ils:"vont" };

const irregulars = {
  être:    { meaning:"to be",        type:"irregular", présent:{je:"suis",tu:"es",il:"est",nous:"sommes",vous:"êtes",ils:"sont"}, pc:{je:"ai été",tu:"as été",il:"a été",nous:"avons été",vous:"avez été",ils:"ont été"} },
  avoir:   { meaning:"to have",      type:"irregular", présent:{je:"ai",tu:"as",il:"a",nous:"avons",vous:"avez",ils:"ont"}, pc:{je:"ai eu",tu:"as eu",il:"a eu",nous:"avons eu",vous:"avez eu",ils:"ont eu"} },
  aller:   { meaning:"to go",        type:"irregular", présent:{je:"vais",tu:"vas",il:"va",nous:"allons",vous:"allez",ils:"vont"}, pc:{je:"suis allé",tu:"es allé",il:"est allé",nous:"sommes allés",vous:"êtes allés",ils:"sont allés"} },
  faire:   { meaning:"to do / make", type:"irregular", présent:{je:"fais",tu:"fais",il:"fait",nous:"faisons",vous:"faites",ils:"font"}, pc:{je:"ai fait",tu:"as fait",il:"a fait",nous:"avons fait",vous:"avez fait",ils:"ont fait"} },
  pouvoir: { meaning:"to be able to",type:"irregular", présent:{je:"peux",tu:"peux",il:"peut",nous:"pouvons",vous:"pouvez",ils:"peuvent"}, pc:{je:"ai pu",tu:"as pu",il:"a pu",nous:"avons pu",vous:"avez pu",ils:"ont pu"} },
  vouloir: { meaning:"to want",      type:"irregular", présent:{je:"veux",tu:"veux",il:"veut",nous:"voulons",vous:"voulez",ils:"veulent"}, pc:{je:"ai voulu",tu:"as voulu",il:"a voulu",nous:"avons voulu",vous:"avez voulu",ils:"ont voulu"} },
  venir:   { meaning:"to come",      type:"irregular", présent:{je:"viens",tu:"viens",il:"vient",nous:"venons",vous:"venez",ils:"viennent"}, pc:{je:"suis venu",tu:"es venu",il:"est venu",nous:"sommes venus",vous:"êtes venus",ils:"sont venus"} },
  prendre: { meaning:"to take",      type:"irregular", présent:{je:"prends",tu:"prends",il:"prend",nous:"prenons",vous:"prenez",ils:"prennent"}, pc:{je:"ai pris",tu:"as pris",il:"a pris",nous:"avons pris",vous:"avez pris",ils:"ont pris"} },
  savoir:  { meaning:"to know",      type:"irregular", présent:{je:"sais",tu:"sais",il:"sait",nous:"savons",vous:"savez",ils:"savent"}, pc:{je:"ai su",tu:"as su",il:"a su",nous:"avons su",vous:"avez su",ils:"ont su"} },
  voir:    { meaning:"to see",       type:"irregular", présent:{je:"vois",tu:"vois",il:"voit",nous:"voyons",vous:"voyez",ils:"voient"}, pc:{je:"ai vu",tu:"as vu",il:"a vu",nous:"avons vu",vous:"avez vu",ils:"ont vu"} },
  mettre:  { meaning:"to put",       type:"irregular", présent:{je:"mets",tu:"mets",il:"met",nous:"mettons",vous:"mettez",ils:"mettent"}, pc:{je:"ai mis",tu:"as mis",il:"a mis",nous:"avons mis",vous:"avez mis",ils:"ont mis"} },
  partir:  { meaning:"to leave",     type:"irregular", présent:{je:"pars",tu:"pars",il:"part",nous:"partons",vous:"partez",ils:"partent"}, pc:{je:"suis parti",tu:"es parti",il:"est parti",nous:"sommes partis",vous:"êtes partis",ils:"sont partis"} },
  dire:    { meaning:"to say",       type:"irregular", présent:{je:"dis",tu:"dis",il:"dit",nous:"disons",vous:"dites",ils:"disent"}, pc:{je:"ai dit",tu:"as dit",il:"a dit",nous:"avons dit",vous:"avez dit",ils:"ont dit"} },
  lire:    { meaning:"to read",      type:"irregular", présent:{je:"lis",tu:"lis",il:"lit",nous:"lisons",vous:"lisez",ils:"lisent"}, pc:{je:"ai lu",tu:"as lu",il:"a lu",nous:"avons lu",vous:"avez lu",ils:"ont lu"} },
  écrire:  { meaning:"to write",     type:"irregular", présent:{je:"écris",tu:"écris",il:"écrit",nous:"écrivons",vous:"écrivez",ils:"écrivent"}, pc:{je:"ai écrit",tu:"as écrit",il:"a écrit",nous:"avons écrit",vous:"avez écrit",ils:"ont écrit"} },
  sortir:  { meaning:"to go out",    type:"irregular", présent:{je:"sors",tu:"sors",il:"sort",nous:"sortons",vous:"sortez",ils:"sortent"}, pc:{je:"suis sorti",tu:"es sorti",il:"est sorti",nous:"sommes sortis",vous:"êtes sortis",ils:"sont sortis"} },
  dormir:  { meaning:"to sleep",     type:"irregular", présent:{je:"dors",tu:"dors",il:"dort",nous:"dormons",vous:"dormez",ils:"dorment"}, pc:{je:"ai dormi",tu:"as dormi",il:"a dormi",nous:"avons dormi",vous:"avez dormi",ils:"ont dormi"} },
};

function regularConj(verb) {
  if (verb.endsWith("er")) {
    const s = verb.slice(0,-2);
    return { type:"-er regular", meaning:null,
      présent:{je:s+"e",tu:s+"es",il:s+"e",nous:s+"ons",vous:s+"ez",ils:s+"ent"},
      pc:{je:`ai ${s}é`,tu:`as ${s}é`,il:`a ${s}é`,nous:`avons ${s}é`,vous:`avez ${s}é`,ils:`ont ${s}é`} };
  }
  if (verb.endsWith("ir")) {
    const s = verb.slice(0,-2);
    return { type:"-ir regular", meaning:null,
      présent:{je:s+"is",tu:s+"is",il:s+"it",nous:s+"issons",vous:s+"issez",ils:s+"issent"},
      pc:{je:`ai ${s}i`,tu:`as ${s}i`,il:`a ${s}i`,nous:`avons ${s}i`,vous:`avez ${s}i`,ils:`ont ${s}i`} };
  }
  if (verb.endsWith("re")) {
    const s = verb.slice(0,-2);
    return { type:"-re regular", meaning:null,
      présent:{je:s+"s",tu:s+"s",il:s,nous:s+"ons",vous:s+"ez",ils:s+"ent"},
      pc:{je:`ai ${s}u`,tu:`as ${s}u`,il:`a ${s}u`,nous:`avons ${s}u`,vous:`avez ${s}u`,ils:`ont ${s}u`} };
  }
  return null;
}

// Strip accents for fuzzy matching
function stripAccents(str) {
  return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

// Build a map from stripped key -> accented key for all irregulars
const strippedMap = {};
for (const key of Object.keys(irregulars)) {
  strippedMap[stripAccents(key)] = key;
}

function resolveVerb(input) {
  // Exact match first
  if (irregulars[input]) return { canonical: input, data: irregulars[input] };
  // Try stripped match against irregulars
  const stripped = stripAccents(input);
  if (strippedMap[stripped]) {
    const canonical = strippedMap[stripped];
    return { canonical, data: irregulars[canonical] };
  }
  // Fall back to regular conjugation using the input as-is
  const data = regularConj(input);
  return data ? { canonical: input, data } : null;
}

function conjugate() {
  const verb = document.getElementById("verbInput").value.trim().toLowerCase();
  if (!verb) return;
  const resolved = resolveVerb(verb);
  const err = document.getElementById("error");
  const out = document.getElementById("output");

  if (!resolved) { err.style.display="block"; out.style.display="none"; return; }
  err.style.display = "none";

  const { canonical, data } = resolved;

  document.getElementById("resultVerb").textContent = canonical;
  const note = [data.meaning, data.type + (data.type.includes("regular") && !irregulars[canonical] ? " (verify irregular forms)" : "")].filter(Boolean).join(" · ");
  document.getElementById("resultNote").textContent = note;

  const fp = Object.fromEntries(Object.entries(allerP).map(([p,a])=>[p,`${a} ${canonical}`]));

  const tenses = [
    { label:"Présent",       conj:data.présent },
    { label:"Passé Composé", conj:data.pc },
    { label:"Futur Proche",  conj:fp },
  ];

  document.getElementById("tensesGrid").innerHTML = tenses.map(t=>`
    <div class="tense-block">
      <h2>${t.label}</h2>
      ${pronouns.map(p=>`
        <div class="row">
          <span class="pron">${labels[p]}</span>
          <span class="form">${t.conj[p]}</span>
        </div>`).join('')}
    </div>`).join('');

  out.style.display = "block";
}

function tryVerb(v) {
  document.getElementById("verbInput").value = v;
  conjugate();
}

document.getElementById("verbInput").addEventListener("keydown", e => {
  if (e.key === "Enter") conjugate();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Conjugueur Français</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        #status { font-size: 12px; color: orange; margin-bottom: 10px; text-align: center; font-weight: bold; }
        .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .verb-form { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div id="status">⏳ Chargement local...</div>
    <input type="text" id="verbInput" placeholder="Ex: manger, etre..." value="manger" disabled>
    
    <select id="tenseSelect">
        <option value="PRESENT">Présent</option>
        <option value="PASSE_COMPOSE">Passé Composé</option>
        <option value="FUTUR">Futur</option>
        <option value="IMPARFAIT">Imparfait</option>
    </select>

    <div id="results"></div>
</div>

<!-- Logic engine from a reliable CDN -->
<script src="https://cdn.jsdelivr.net"></script>

<script>
    let Lefff = null;
    const input = document.getElementById('verbInput');
    const status = document.getElementById('status');

    async function init() {
        try {
            // FIX: Loading from YOUR folder (Same-Origin) bypasses all security blocks
            const response = await fetch('./conjugations.json');
            if (!response.ok) throw new Error("Fichier local introuvable");
            
            Lefff = await response.json();
            status.textContent = "✅ Dictionnaire chargé localement !";
            status.style.color = "green";
            input.disabled = false;
            update();
        } catch (e) {
            status.textContent = "❌ Erreur: Assurez-vous que conjugations.json est bien dans le dossier.";
            status.style.color = "red";
        }
    }

    function update() {
        if (!Lefff || !window.FrenchVerbs) return;
        const verb = input.value.trim().toLowerCase() || "manger";
        const tense = document.getElementById('tenseSelect').value;
        const pronouns = ['Je', 'Tu', 'Il', 'Nous', 'Vous', 'Ils'];
        
        let html = "";
        try {
            for (let i = 0; i < 6; i++) {
                const form = FrenchVerbs.getConjugation(Lefff, verb, tense, i);
                html += `<div class="row"><span>${pronouns[i]}</span><span class="verb-form">${form}</span></div>`;
            }
            document.getElementById('results').innerHTML = html;
        } catch (e) {
            document.getElementById('results').innerHTML = "Verbe non trouvé.";
        }
    }

    input.addEventListener('input', update);
    document.getElementById('tenseSelect').addEventListener('change', update);
    init();
</script>
</body>
</html>

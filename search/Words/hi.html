<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>French Conjugator</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .verb-form { color: #007bff; font-weight: bold; }
        #status { font-size: 12px; color: orange; margin-bottom: 10px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div id="status">Loading Universal Dictionary...</div>
    <input type="text" id="verbInput" placeholder="Loading..." disabled>
    <select id="tenseSelect">
        <option value="PRESENT">Présent</option>
        <option value="PASSE_COMPOSE">Passé Composé</option>
        <option value="FUTUR">Futur</option>
        <option value="IMPARFAIT">Imparfait</option>
    </select>
    <div id="results"></div>
</div>

<!-- 1. Load the conjugation logic engine -->
<script src="https://cdn.jsdelivr.net"></script>

<!-- 2. Load the Data as a script to bypass ALL CORS/Fetch errors -->
<script src="https://cdn.jsdelivr.net"></script>

<script>
    // This runs once the 'Lefff' script above finishes loading
    window.onload = function() {
        const input = document.getElementById('verbInput');
        const select = document.getElementById('tenseSelect');
        const status = document.getElementById('status');
        const resultsDiv = document.getElementById('results');

        // window.Lefff is automatically created by the second script tag
        if (window.Lefff) {
            status.textContent = "Ready! 9,000+ verbs loaded.";
            status.style.color = "green";
            input.disabled = false;
            input.placeholder = "Ex: être, manger, finir...";
            update();
        } else {
            status.textContent = "Error: Dictionary failed to inject.";
            status.style.color = "red";
        }

        function update() {
            const verb = input.value.trim().toLowerCase() || "être";
            const tense = select.value;
            const pronouns = ['Je', 'Tu', 'Il', 'Nous', 'Vous', 'Ils'];
            
            let html = "";
            try {
                for (let i = 0; i < 6; i++) {
                    const form = FrenchVerbs.getConjugation(window.Lefff, verb, tense, i);
                    html += `<div class="row"><span>${pronouns[i]}</span><span class="verb-form">${form}</span></div>`;
                }
                resultsDiv.innerHTML = html;
            } catch (e) {
                resultsDiv.innerHTML = "<p style='color:red; text-align:center;'>Verb not found.</p>";
            }
        }

        input.addEventListener('input', update);
        select.addEventListener('change', update);
    };
</script>
</body>
</html>

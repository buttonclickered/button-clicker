<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>French Conjugator</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        .verb-form { color: #007bff; font-weight: bold; }
        #status { font-size: 12px; color: orange; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div id="status">Loading Dictionary...</div>
    <input type="text" id="verbInput" placeholder="Ex: être, manger, finir..." disabled>
    <select id="tenseSelect">
        <option value="PRESENT">Présent</option>
        <option value="PASSE_COMPOSE">Passé Composé</option>
        <option value="FUTUR">Futur</option>
    </select>
    <div id="results"></div>
</div>

<!-- Load the engine -->
<script src="https://cdn.jsdelivr.net"></script>

<script>
    let Lefff = null;
    const input = document.getElementById('verbInput');
    const select = document.getElementById('tenseSelect');
    const status = document.getElementById('status');

    async function loadDatabase() {
        // Use the EXACT URL you confirmed is working
        const url = 'https://buttonclicker.ca';

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("Network response was not ok");
            
            Lefff = await response.json();
            
            status.textContent = "Ready! 9,000+ verbs loaded.";
            status.style.color = "green";
            input.disabled = false;
            update();
        } catch (e) {
            status.textContent = "Error loading dictionary from " + url;
            status.style.color = "red";
            console.error(e);
        }
    }

    function update() {
        if (!Lefff) return;
        const verb = input.value.trim().toLowerCase() || "être";
        const tense = select.value;
        const pronouns = ['Je', 'Tu', 'Il', 'Nous', 'Vous', 'Ils'];
        
        let html = "";
        try {
            for (let i = 0; i < 6; i++) {
                const form = FrenchVerbs.getConjugation(Lefff, verb, tense, i);
                html += `<div class="row"><span>${pronouns[i]}</span><span class="verb-form">${form}</span></div>`;
            }
            document.getElementById('results').innerHTML = html;
        } catch (e) {
            document.getElementById('results').innerHTML = "Verb not found.";
        }
    }

    input.addEventListener('input', update);
    select.addEventListener('change', update);
    loadDatabase();
</script>
a
</body>
</html>

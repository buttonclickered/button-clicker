<!DOCTYPE html>
<html> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        /* 1. Parallax & Body Setup */
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .parallax-wrapper {
            height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            perspective: 1px;
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            padding: 1.5rem;
        }

        .parallax-wrapper::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('/search/Images/background.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
            transform: translateZ(-1px) scale(3);
            transform-origin: center;
        }

        /* 2. Search Box Styling */
        #searcher {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 { font-size: 2.2rem; margin-bottom: 0.5rem; font-weight: 500; color: #111; }
        p { color: #666; margin-bottom: 2rem; font-size: 0.95rem; }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        input {
            padding: 12px 15px;
            width: 100%;
            max-width: 350px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #111; }

        /* 3. Checkbox & Button Alignment */
        .input-group {
            display: flex;
            align-items: center; /* This fixes the "off" alignment */
            justify-content: center;
            gap: 12px;
            margin-top: 5px;
        }

        input[type="checkbox"] {
            margin: 0;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #111;
        }

        label {
            font-size: 0.95rem;
            color: #444;
            cursor: pointer;
            user-select: none;
        }

        button {
            padding: 10px 25px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-family: inherit;
            transition: background 0.2s;
        }

        button:hover { background: #333; }
    </style>
</head>
<body>

    <div class="parallax-wrapper">
        <div id="searcher">
            <h1>Search</h1>
            <p>Search for grammar rules and verb conjugation.</p>
            
            <form action="search_results.html" method="get">
                <!-- Main Search Input -->
                <input type="text" name="query" placeholder="Enter a rule or verb..." autocomplete="off" required>
                
                <!-- Aligned Checkbox and Button Group -->
                <div class="input-group">
                    <input type="checkbox" name="conjugate" id="conjugate">
                    <label for="conjugate">Conjugate</label>
                    <button type="submit">Search</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>

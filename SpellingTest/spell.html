<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spelling Game + Leaderboard</title>

<style>
body { font-family: Arial; margin:20px; }

.hidden { display:none; }

.box {
  border:2px solid black;
  padding:20px;
  max-width:800px;
  margin-bottom:20px;
}

input, select, button {
  padding:8px;
  margin:5px;
}

#answer {
  width:100%;
  font-size:18px;
}

.leaderboard {
  border:1px solid #000;
  padding:10px;
  margin-top:10px;
}

.tab {
  cursor:pointer;
  padding:5px 10px;
  border:1px solid black;
  margin-right:5px;
  display:inline-block;
}

.active {
  background:black;
  color:white;
}
</style>
</head>

<body>

<h1>Spelling Game Pro</h1>

<!-- NAME -->
<input id="name" placeholder="Enter your name">

<!-- SETTINGS -->
<select id="difficulty">
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="hard">Hard</option>
</select>

<button onclick="startGame()">Start Game</button>

<!-- GAME -->
<div id="game" class="box hidden">

<div>
🔥 Streak: <span id="streak">0</span> |
⭐ Points: <span id="points">0</span>
</div>

<input id="answer" placeholder="Type word">

<button onclick="newWord()">New Word</button>
<button onclick="check()">Check</button>
<button onclick="repeat()">🔊 Repeat</button>
<button onclick="submitScore()">🏆 Submit Score</button>

<div id="status"></div>
<div id="result"></div>

</div>

<!-- LEADERBOARD -->
<div class="box">

<h2>Leaderboard</h2>

<div>
<span class="tab active" onclick="loadBoard('easy')">Easy</span>
<span class="tab" onclick="loadBoard('medium')">Medium</span>
<span class="tab" onclick="loadBoard('hard')">Hard</span>
</div>

<div id="board" class="leaderboard">Loading...</div>

</div>

<script>

/* ================= SERVER ================= */

const SERVER = "https://button-clicker.onrender.com/leaderboard";

/* ================= WORDS ================= */

const words = {
easy:["rocket","pocket","science","coin","house","tower","mirror","check","finish"],
medium:["intrigue","debt","guardian","dilemma","committee","compassion","marathon","infection"],
hard:["prearrange","postscript","predetermine","unrequited","betrothed","enamored","volcanoes"]
};

/* ================= GAME STATE ================= */

let currentWord = "";
let used = false;
let streak = 0;
let points = 0;

/* ================= START GAME ================= */

function startGame() {
  document.getElementById("game").classList.remove("hidden");
  newWord();
}

/* ================= SPEAK ================= */

function speak(word) {
  let u = new SpeechSynthesisUtterance(word);
  u.rate = 0.4;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

/* ================= NEW WORD ================= */

function newWord() {
  let diff = document.getElementById("difficulty").value;
  let pool = words[diff];

  currentWord = pool[Math.floor(Math.random()*pool.length)];
  used = false;

  document.getElementById("answer").value = "";
  document.getElementById("status").innerText = "Spell the word";
  document.getElementById("result").innerText = "";

  speak(currentWord);
}

/* ================= CHECK (ANTI CHEAT) ================= */

function check() {
  if (used) return;
  used = true;

  let user = document.getElementById("answer").value.trim().toLowerCase();

  if (user === currentWord) {
    streak++;
    points += streak;
    document.getElementById("result").innerText = "✅ Correct!";
  } else {
    streak = 0;
    document.getElementById("result").innerText = "❌ Wrong: " + currentWord;
  }

  document.getElementById("streak").innerText = streak;
  document.getElementById("points").innerText = points;
}

/* ================= REPEAT ================= */

function repeat() {
  speak(currentWord);
}

/* ================= SUBMIT SCORE ================= */

function submitScore() {
  let name = document.getElementById("name").value || "Player";
  let mode = document.getElementById("difficulty").value;

  fetch(`${SERVER}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: name,
      mode: mode,
      score: points
    })
  }).then(()=>{
    loadBoard(mode);
    alert("Score submitted!");
  });
}

/* ================= LEADERBOARD ================= */

function loadBoard(mode) {

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event?.target?.classList.add("active");

  fetch(`${SERVER}/${mode}`)
    .then(res=>res.json())
    .then(data=>{

      let html = "<ol>";

      data.forEach(p=>{
        html += `<li>${p.name} - ${p.score}</li>`;
      });

      html += "</ol>";

      document.getElementById("board").innerHTML = html;
    });
}

/* auto refresh */
setInterval(()=>{
  let mode = document.getElementById("difficulty")?.value || "easy";
  loadBoard(mode);
}, 5000);

/* default load */
loadBoard("easy");

</script>

</body>
</html>
